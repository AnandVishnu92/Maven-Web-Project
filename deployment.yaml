apiVersion: apps/v1
kind: Deployment
metadata:
  name: maven-web-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: maven-web-app
  template:
    metadata:
      labels:
        app: maven-web-app
    spec:
      containers:
      - name: maven-web-app
        image: 123456789012.dkr.ecr.ap-south-1.amazonaws.com/maven-web-app:latest
        ports:
        - containerPort: 8080

 apiVersion: v1
kind: Service
metadata:
  name: maven-web-service
spec:
  type: LoadBalancer
  selector:
    app: maven-web-app
  ports:
  - port: 80
    targetPort: 8080
